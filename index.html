<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto-blog</title>
</head>

<body>

    <div id="vista-lista">
        <h1>Posts</h1>

        <div id="controles-filtros">
            
            <div id="contenedor-input-autor">
                <input id="input-autor-busqueda" type="text" placeholder="Buscar por autor..." autocomplete="off" />
                <div id="sugerencias-autor"></div>
            </div>

            
            <select id="select-tag">
                <option value="">Todas las categorías</option>
            </select>

            <select id="select-orden">
                <option value="default">Ordenar por...</option>
                <option value="likes">Más likes</option>
                <option value="views">Más vistas</option>
                <option value="title">Título A-Z</option>
            </select>

            <button id="btn-crear">Nueva publicación</button>
        </div>

        <ul id="lista"></ul>

        <div id="contenedor-paginacion"></div>
    </div>

    <div id="vista-detalle" style="display:none">
        <div id="detalle-contenido"></div>
    </div>

    <div id="vista-crear" style="display:none">
        <div id="crear-contenido"></div>
    </div>

    <div id="vista-editar" style="display:none">
        <div id="editar-overlay" style="display:none">
            <div class="spinner"></div>
        </div>
        <div id="editar-contenido"></div>
    </div>
    
    <div id="toast" style="display:none"></div>

    <script type="module" src="js/main.js"></script>
</body>

</html>
