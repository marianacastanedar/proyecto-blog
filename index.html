<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto-blog</title>
</head>

<body>
    <!-- Inicio -->
    <div id="vista-lista">
        <h1>Posts</h1>
        <ul id="lista"></ul>
    </div>

    <!-- Detalle -->
    <div id="vista-detalle" style="display:none">
        <div id="detalle-contenido"></div>
    </div>

    <!-- crear post -->
    <div id="vista-crear" style="display:none">
        <div id="crear-contenido"></div>
    </div>

    <!-- mensaje de éxito -->
    <div id="toast" style="display:none"></div>

    <!-- editar -->
    <div id="vista-editar" style="display: none;">
 
    <div id="editar-overlay" style="display: none;">
        <div class="spinner"></div>
    </div>
 
    <div id="editar-contenido"></div>

    <script type="module" src="js/main.js"></script>
</body>

</html>
