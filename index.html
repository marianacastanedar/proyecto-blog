<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto-blog</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
</head>

<body>

    <nav class="navbar">
        <span class="navbar-brand">blogged.</span>
    </nav>

    <div id="vista-lista">
        <h1>Posts</h1>

        <div id="controles-filtros">
            <select id="select-tipo-filtro">
                <option value="autor">Autor</option>
                <option value="categoria">Categoría</option>
            </select>

            <div id="contenedor-busqueda">
                <input id="input-busqueda" type="text" placeholder="Buscar por autor..." autocomplete="off" />
                <div id="sugerencias"></div>
            </div>

            <button id="btn-crear">Nueva publicación</button>
        </div>

        <ul id="lista"></ul>

        <div id="contenedor-paginacion"></div>
    </div>

    <div id="vista-detalle" style="display:none">
        <div id="detalle-contenido"></div>
    </div>

    <div id="vista-crear" style="display:none">
        <div id="crear-contenido"></div>
    </div>

    <div id="vista-editar" style="display:none">
        <div id="editar-overlay" style="display:none">
            <div class="spinner"></div>
        </div>
        <div id="editar-contenido"></div>
    </div>

    <div id="toast" style="display:none"></div>

    <script type="module" src="js/main.js"></script>
</body>

</html>
